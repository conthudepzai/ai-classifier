<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Classifier</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-xl mx-auto bg-white rounded-3xl shadow-2xl p-8">
        <h1 class="text-3xl font-extrabold text-gray-900 mb-2">AI Image Classifier</h1>
        <p id="status" class="text-sm font-medium text-blue-600 mb-6 animate-pulse">Initializing model...</p>

        <!-- Dropzone Area -->
        <div id="drop-zone" class="border-4 border-dashed border-gray-200 rounded-2xl p-10 text-center cursor-pointer hover:border-blue-400 transition-all duration-300">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-prompt">
                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                <p class="mt-4 text-gray-600">Drag & drop an image or <span class="text-blue-600 font-bold underline">click to upload</span></p>
            </div>
            <img id="preview" class="mt-4 mx-auto max-h-64 rounded-xl hidden shadow-lg" alt="Preview">
        </div>

        <!-- Predictions Display -->
        <div id="results" class="mt-8 space-y-4 hidden">
            <h2 class="text-xl font-bold text-gray-800">Classification Results</h2>
            <div id="label-container" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const URL = "https://teachablemachine.withgoogle.com/models/uK9NxkH5z/";
        let model;

        async function init() {
            const status = document.getElementById('status');
            try {
                model = await tmImage.load(URL + "model.json", URL + "metadata.json");
                status.innerText = "Model Ready: Please select an image.";
                status.classList.remove('animate-pulse');
                status.classList.add('text-green-600');
            } catch (e) {
                status.innerText = "Error: Could not load model.";
                status.classList.add('text-red-600');
            }
        }

        async function predict(imageElement) {
            const status = document.getElementById('status');
            status.innerText = "Analyzing...";
            
            const predictions = await model.predict(imageElement);
            // Sort and get Top 5
            const top5 = [...predictions]
                .sort((a, b) => b.probability - a.probability)
                .slice(0, 5);
            
            const container = document.getElementById('label-container');
            container.innerHTML = '';
            document.getElementById('results').classList.remove('hidden');
            status.innerText = "Analysis Complete.";

            top5.forEach((pred, index) => {
                const percent = (pred.probability * 100).toFixed(1);
                const isTop = index === 0;
                const div = document.createElement('div');
                div.className = `p-4 rounded-xl border ${isTop ? 'bg-blue-50 border-blue-200 shadow-sm' : 'bg-white border-gray-100'}`;
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold ${isTop ? 'text-blue-800' : 'text-gray-700'}">${pred.className}</span>
                        <span class="text-sm font-black ${isTop ? 'text-blue-600' : 'text-gray-500'}">${percent}%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                        <div class="${isTop ? 'bg-blue-600' : 'bg-gray-400'} h-3 rounded-full transition-all duration-700 ease-out" style="width: ${percent}%"></div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Interaction logic
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => processFile(e.target.files[0]);

        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('border-blue-500'); };
        dropZone.ondragleave = () => dropZone.classList.remove('border-blue-500');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500');
            processFile(e.dataTransfer.files[0]);
        };

        function processFile(file) {
            if (!file || !model) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.src = e.target.result;
                preview.classList.remove('hidden');
                document.getElementById('upload-prompt').classList.add('hidden');
                preview.onload = () => predict(preview);
            };
            reader.readAsDataURL(file);
        }

        init();
    </script>
</body>
</html>
